name: flutter_bus_application
description: A Flutter app for bus journey planning.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # 🛰️ API calls
  http: ^1.2.1

  # 💾 Local storage for session/token
  shared_preferences: ^2.2.2

  # 📍 Location services for Nearest Bus Stand
  geolocator: ^11.0.0

  # ⚠️ Runtime permissions (for Android location permission)
  permission_handler: ^11.3.1

  # UI & Animations
  google_maps_flutter: ^2.7.0
  lottie: ^3.1.2
  shimmer: ^3.0.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/bus_stands.json
